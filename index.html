<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel OCR Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        #output { width: 100%; height: 500px; margin-top: 15px; padding: 12px; background: #000; color: #00ff41; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; overflow-y: auto; white-space: pre-wrap; }
        button { background: #2962ff; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { background: #0039cb; }
        #status { text-align: center; margin: 10px 0; color: #ffab00; font-size: 14px; }
        .info { font-size: 11px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Derin Tarama Metin Ayıklayıcı</h3>
    <p class="info">Sizin hazırladığınız gri tonlamalı resimler için optimize edildi.</p>
    
    <input type="file" id="imageInput" accept="image/*" style="width: 100%; margin-bottom: 15px;">
    <button id="runBtn" onclick="runOCR()">METNİ ÇIKAR (DERİN TARAMA)</button>
    
    <div id="status">Hazır. Dosya seçiniz.</div>
    <div id="output"></div>
</div>

<script>
    async function runOCR() {
        const input = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const btn = document.getElementById('runBtn');

        if (!input.files[0]) return alert("Resim seçin!");

        btn.disabled = true;
        output.innerText = "";
        status.innerText = "Yapay zeka motoru yükleniyor...";

        try {
            // Tesseract'ın en güncel ve en zeki motorunu kuruyoruz
            const worker = await Tesseract.createWorker('tur+eng', 1, {
                logger: m => {
                    if(m.status === 'recognizing text') {
                        status.innerText = `Okunuyor: %${Math.round(m.progress * 100)}`;
                    }
                }
            });

            // Play Store uygulamalarının kullandığı "Sparse Text" (Dağınık Metin) modu
            await worker.setParameters({
                tessedit_pageseg_mode: '1', // Otomatik sayfa segmentasyonu (En yavaşı ama en hatasızı)
                tessedit_ocr_engine_mode: '1', // Sadece LSTM (Yapay sinir ağı) modu
                tessedit_do_invert: '0', // Sizin ayarlarınız zaten net olduğu için ekstra ters çevirme yapma
            });

            const { data: { text } } = await worker.recognize(input.files[0]);

            output.innerText = text;
            status.innerText = "İŞLEM TAMAMLANDI!";
            
            await worker.terminate();
        } catch (e) {
            status.innerText = "Hata: " + e.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
