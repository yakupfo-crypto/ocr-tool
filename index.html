<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor OdaklÄ± Keskin OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: monospace; padding: 10px; background: #121212; color: #00ff00; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        #output { width: 100%; height: 500px; margin-top: 15px; padding: 10px; border: 1px solid #00ff00; background: #000; color: #00ff00; white-space: pre-wrap; overflow-y: auto; font-size: 12px; box-sizing: border-box; }
        button { background: #00ff00; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        #status { margin-top: 10px; font-weight: bold; font-size: 14px; text-align: center; }
        progress { width: 100%; margin-top: 10px; }
        input[type="file"] { background: #222; color: #eee; padding: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">MaĂ§ SkorlarÄ± OCR (Keskin Mod)</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button id="startBtn" onclick="processImage()">VERÄ°YÄ° Ă‡IKAR</button>
    <div id="status">HazÄ±r</div>
    <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
    <div id="output"></div>
</div>

<script>
    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const btn = document.getElementById('startBtn');
        const prog = document.getElementById('progressBar');

        if (!fileInput.files[0]) return alert("Resim seĂ§in!");

        btn.disabled = true;
        output.innerText = "Ä°Ĺźlem baĹźlÄ±yor...";
        prog.style.display = "block";
        
        const file = fileInput.files[0];
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // SkorlarÄ±n kaybolmamasÄ± iĂ§in keskinleĹźtirme ve kontrast artÄ±rÄ±mÄ±
            const segmentHeight = 1500; // Daha kĂĽĂ§ĂĽk parĂ§alar daha iyi odaklanma saÄźlar
            const totalSegments = Math.ceil(img.height / segmentHeight);
            
            // Tesseract'Ä± Ă¶zel parametrelerle baĹźlat (Sadece TĂĽrkĂ§e deÄźil, sayÄ±larÄ± da Ă¶nceliklendir)
            const worker = await Tesseract.createWorker('tur+eng');
            
            // SayÄ±sal veriler iĂ§in motor parametrelerini ayarla
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzĂ§ÄźÄ±Ă¶ĹźĂĽĂ‡ÄžÄ°Ă–ĹžĂś-.:() ',
                preserve_interword_spaces: '1',
            });

            let finalResult = "";

            for (let i = 0; i < totalSegments; i++) {
                status.innerText = `Okunuyor: %${Math.round((i/totalSegments)*100)}`;
                prog.value = (i / totalSegments) * 100;

                const currentHeight = Math.min(segmentHeight, img.height - (i * segmentHeight));
                canvas.width = img.width;
                canvas.height = currentHeight;

                // GĂ¶rĂĽntĂĽ Ă–n Ä°Ĺźleme (Filtreleme)
                ctx.filter = 'contrast(1.5) grayscale(1)'; // SkorlarÄ± netleĹźtirmek iĂ§in siyah-beyaz ve yĂĽksek kontrast
                ctx.drawImage(img, 0, i * segmentHeight, img.width, currentHeight, 0, 0, img.width, currentHeight);
                
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png')); // PNG daha nettir
                const { data: { text } } = await worker.recognize(blob);
                
                finalResult += text + "\n";
                output.innerText = finalResult;
            }

            status.innerText = "Ä°Ĺźlem TamamlandÄ±!";
            prog.value = 100;
            btn.disabled = false;
            await worker.terminate();
            URL.revokeObjectURL(objectUrl);
        };

        img.src = objectUrl;
    }
</script>

</body>
</html>
