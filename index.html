<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Sonuçları OCR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #eef2f7; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #drop-area { border: 2px dashed #28a745; padding: 30px; text-align: center; border-radius: 10px; color: #28a745; font-weight: bold; cursor: pointer; }
        #status { margin: 10px 0; font-size: 13px; color: #555; text-align: center; }
        #output { white-space: pre-wrap; background: #222; color: #fff; padding: 15px; border-radius: 10px; min-height: 200px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .progress-bar { height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-bottom: 10px; display: none; }
        #p-fill { height: 100%; background: #28a745; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align: center;">Maç Listesi Dönüştürücü</h3>
    <div id="drop-area">Ekran Görüntüsü Yükle</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status">Bekleniyor...</div>
    <div class="progress-bar" id="p-bar"><div id="p-fill"></div></div>
    
    <div id="output">Sonuçlar burada (IY skorları dahil) listelenecek...</div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const pFill = document.getElementById('p-fill');
    const pBar = document.getElementById('p-bar');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = function(e) {
        const file = e.target.files[0];
        if (file) processImage(file);
    };

    async function processImage(file) {
        output.innerText = "";
        pBar.style.display = "block";
        status.innerText = "Resim işleniyor (Görüntü iyileştirme aktif)...";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Bellek hatasını önlemek için 1200px parçalar idealdir
            const chunkH = 1200;
            const totalC = Math.ceil(img.height / chunkH);
            
            const worker = await Tesseract.createWorker('tur');
            // OCR Ayarları: Maç listeleri gibi yapılar için PSM 6 (Blok metin) en iyisidir
            await worker.setParameters({
                tessedit_pageseg_mode: '6', 
                preserve_interword_spaces: '1'
            });

            for (let i = 0; i < totalC; i++) {
                status.innerText = `Okunuyor: %${Math.round(((i+1)/totalC)*100)}`;
                pFill.style.width = ((i+1)/totalC)*100 + "%";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const drawH = Math.min(chunkH, img.height - (i * chunkH));
                
                canvas.width = img.width;
                canvas.height = drawH;

                // GÖRÜNTÜ İYİLEŞTİRME: Kontrastı artırarak skorları belirginleştir
                ctx.filter = 'contrast(1.4) grayscale(1)'; 
                ctx.drawImage(img, 0, i * chunkH, img.width, drawH, 0, 0, img.width, drawH);
                
                const { data: { text } } = await worker.recognize(canvas);
                
                // Küçük harf hatalarını ve gereksiz boşlukları temizleyerek ekle
                const cleanedText = text.replace(/\n\s*\n/g, '\n'); 
                output.innerText += cleanedText;
            }

            status.innerText = "İşlem bitti. Skorları kontrol edebilirsiniz.";
            await worker.terminate();
        };
    }
</script>
</body>
</html>
