<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Metin Dönüştürücü</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        #output { background: white; padding: 15px; border-radius: 8px; min-height: 200px; white-space: pre-wrap; margin-top: 20px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; padding: 15px 25px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h3>Hatasız OCR Sistemi</h3>
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 20px;">
    <button onclick="convertText()">METNE DÖNÜŞTÜR (HIZLI)</button>

    <div id="status"></div>
    <div id="output" placeholder="Metin burada görünecek..."></div>

    <script>
        async function convertText() {
            const fileInput = document.getElementById('imageInput');
            const outputDiv = document.getElementById('output');
            const status = document.getElementById('status');
            const apiKey = 'BURAYA_GOOGLE_API_KEYINIZI_YAZIN';

            if (fileInput.files.length === 0) return alert("Lütfen bir görsel seçin!");

            status.innerText = "İşleniyor... Sıfır hata analizi yapılıyor...";
            
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];

                const requestBody = {
                    requests: [{
                        image: { content: base64Image },
                        features: [{ type: "TEXT_DETECTION" }]
                    }]
                };

                try {
                    const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify(requestBody)
                    });
                    const data = await response.json();
                    
                    // Eksiksiz tam metni çekme
                    const fullText = data.responses[0].fullTextAnnotation.text;
                    outputDiv.innerText = fullText;
                    status.innerText = "Tamamlandı!";
                } catch (error) {
                    status.innerText = "Hata oluştu!";
                    console.error(error);
                }
            };
        }
    </script>
</body>
</html>
