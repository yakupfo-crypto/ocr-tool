<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesin Sonu챌 OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 15px; }
        .box { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        #drop-area { border: 2px dashed #00ff00; padding: 30px; text-align: center; cursor: pointer; color: #00ff00; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; color: #00ff00; border: 1px solid #333; height: 300px; overflow-y: auto; }
        .status { font-size: 12px; color: #aaa; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align: center;">IY Skor Destekli Taray캇c캇</h3>
    <div id="drop-area">Uzuuuun Ekran G철r체nt체s체n체 Se챌</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status" class="status">Haz캇r...</div>
    <div id="output">Skorlar burada birle힊ecek...</div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = function(e) {
        const file = e.target.files[0];
        if (file) startDeepScan(file);
    };

    async function startDeepScan(file) {
        output.innerText = "";
        status.innerText = "Y체ksek 챌철z체n체rl체kl체 analiz ba힊lat캇l캇yor...";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // IY skorlar캇n캇 yakalamak i챌in par챌alar캇 daha k체챌체k (800px) tutuyoruz
            const chunkH = 800; 
            const totalC = Math.ceil(img.height / chunkH);
            
            const worker = await Tesseract.createWorker('tur');
            
            // KR캅T캅K AYAR: Sadece ma챌 sonu챌lar캇nda g철r체lebilecek karakterlere odaklan
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789-()ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz체휓캇i힊챌철횥휒캅캅힇횉횜. ',
                tessedit_pageseg_mode: '6', // Tek blok metin olarak oku
            });

            for (let i = 0; i < totalC; i++) {
                status.innerText = `Derin Tarama: %${Math.round(((i+1)/totalC)*100)}`;
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const drawH = Math.min(chunkH, img.height - (i * chunkH));
                
                canvas.width = img.width;
                canvas.height = drawH;

                // G횜R횥NT횥Y횥 "ADL캅 B캅L캅힇캅M" SEV캅YES캅NDE NETLE힇T캅R
                // Soluk IY skorlar캇n캇 siyah-beyaz yaparak belirginle힊tirir
                ctx.filter = 'contrast(2) brightness(1.1) grayscale(1)'; 
                ctx.drawImage(img, 0, i * chunkH, img.width, drawH, 0, 0, img.width, drawH);
                
                const { data: { text } } = await worker.recognize(canvas);
                
                // Gereksiz "Ms", "B", "v0" gibi tek karakterlik OCR hatalar캇n캇 filtrele
                const lines = text.split('\n');
                const filteredLines = lines.filter(line => line.length > 3);
                
                output.innerText += filteredLines.join('\n') + '\n';
            }

            status.innerText = "Tarama bitti! IY skorlar캇n캇 kontrol edin.";
            await worker.terminate();
        };
    }
</script>
</body>
</html>
