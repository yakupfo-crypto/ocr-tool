<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıfır Hata Maç OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        #drop-area { border: 2px dashed #00ff00; padding: 30px; text-align: center; color: #00ff00; cursor: pointer; }
        #output { margin-top: 20px; background: black; padding: 10px; border-radius: 5px; font-family: monospace; white-space: pre; overflow-x: auto; font-size: 14px; border-left: 4px solid #00ff00; }
        .loader { height: 5px; background: #333; margin-top: 10px; display:none; }
        .fill { height: 100%; background: #00ff00; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="box">
    <h3>🔍 Kesin Sonuçlu Maç Çözücü</h3>
    <div id="drop-area">EKRAN GÖRÜNTÜSÜ SEÇ (IY Skorları Dahil)</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status" style="margin-top:10px; font-size:12px;">Hazır.</div>
    <div class="loader" id="loader"><div class="fill" id="fill"></div></div>
    
    <div id="output">Sonuçlar buraya gelecek...</div>
</div>

<script>
    const fileElem = document.getElementById('fileElem');
    const dropArea = document.getElementById('drop-area');
    const output = document.getElementById('output');
    const fill = document.getElementById('fill');
    const loader = document.getElementById('loader');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = e => {
        const file = e.target.files[0];
        if (file) startDeepOCR(file);
    };

    async function startDeepOCR(file) {
        output.innerText = "İşleniyor... Lütfen bekleyin.";
        loader.style.display = "block";
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            const worker = await Tesseract.createWorker('tur');
            // Kesinlik ayarları
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789-()ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ',
                tessedit_pageseg_mode: '6'
            });

            // Görüntüyü 1000 piksellik parçalara böl ama her parçayı 3 KAT BÜYÜT
            const partH = 1000;
            const totalParts = Math.ceil(img.height / partH);
            let finalResult = "";

            for (let i = 0; i < totalParts; i++) {
                document.getElementById('status').innerText = `Parça ${i+1}/${totalParts} işleniyor...`;
                fill.style.width = ((i+1)/totalParts)*100 + "%";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const drawH = Math.min(partH, img.height - (i * partH));

                // ZOOM ETKİSİ: OCR'ın küçük yazıları görmesi için %300 büyütüyoruz
                canvas.width = img.width * 2; 
                canvas.height = drawH * 2;

                // Görüntü Kalitesi İyileştirme
                ctx.filter = 'contrast(1.5) grayscale(1) brightness(1.1)';
                ctx.drawImage(img, 0, i * partH, img.width, drawH, 0, 0, canvas.width, canvas.height);
                
                const { data: { text } } = await worker.recognize(canvas);
                finalResult += text + "\n";
            }

            output.innerText = finalResult.trim();
            document.getElementById('status').innerText = "✅ Tamamlandı! IY skorlarını kontrol edin.";
            await worker.terminate();
        };
    }
</script>
</body>
</html>
