<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Odaklı Kesintisiz OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #121212; color: #eee; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; border: 1px solid #333; }
        #output { width: 100%; height: 450px; margin-top: 15px; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: #00ff00; white-space: pre-wrap; text-align: left; overflow-y: auto; box-sizing: border-box; font-family: monospace; font-size: 13px; }
        button { background: #00c853; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:disabled { background: #555; }
        #status { margin: 10px 0; font-weight: bold; color: #ffab00; }
        progress { width: 100%; height: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Maç Skoru & Metin Ayıklayıcı</h3>
    <p style="font-size: 12px; color: #aaa;">İlk yarı skorları ve rakamlar için optimize edildi.</p>
    
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom:10px; width:100%;">
    <button id="startBtn" onclick="processImage()">ŞİMDİ OKU</button>
    
    <div id="status">Hazır</div>
    <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
    
    <div id="output"></div>
</div>

<script>
    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const btn = document.getElementById('startBtn');
        const prog = document.getElementById('progressBar');

        if (!fileInput.files[0]) return alert("Resim seçilmedi!");

        btn.disabled = true;
        output.innerText = "";
        prog.style.display = "block";
        status.innerText = "Sistem hazırlanıyor...";

        const file = fileInput.files[0];
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const segmentHeight = 1500; // Daha küçük parçalar daha iyi doğruluk sağlar
            const totalSegments = Math.ceil(img.height / segmentHeight);
            
            // Skorlar için sayısal hassasiyeti artırılmış motor
            const worker = await Tesseract.createWorker('tur+eng');
            
            // Tesseract parametre ayarları: Sayı ve sembolleri korur
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzĞÜŞİÖÇğüşıöç()-: ',
                preserve_interword_spaces: '1',
            });

            let finalResult = "";

            for (let i = 0; i < totalSegments; i++) {
                status.innerText = `Skorlar okunuyor: ${i + 1}/${totalSegments}`;
                prog.value = ((i / totalSegments) * 100);

                const currentHeight = Math.min(segmentHeight, img.height - (i * segmentHeight));
                canvas.width = img.width;
                canvas.height = currentHeight;

                // --- Görüntü İyileştirme (Contrast & Grayscale) ---
                ctx.filter = 'grayscale(1) contrast(1.2) brightness(1.1)';
                ctx.drawImage(img, 0, i * segmentHeight, img.width, currentHeight, 0, 0, img.width, currentHeight);
                
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                const { data: { text } } = await worker.recognize(blob);
                
                finalResult += text + "\n";
                output.innerText = finalResult;
                output.scrollTop = output.scrollHeight; // Otomatik aşağı kaydır
            }

            status.innerText = "İşlem başarıyla tamamlandı!";
            prog.value = 100;
            btn.disabled = false;
            await worker.terminate();
            URL.revokeObjectURL(objectUrl);
        };

        img.src = objectUrl;
    }
</script>

</body>
</html>
