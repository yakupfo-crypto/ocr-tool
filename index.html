<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksiksiz Skor OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #000; color: #fff; }
        .box { border: 2px solid #00ff00; padding: 15px; border-radius: 10px; }
        #output { width: 100%; height: 500px; margin-top: 15px; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 12px; overflow-y: scroll; white-space: pre-wrap; font-family: monospace; }
        button { background: #00ff00; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; }
        #status { color: yellow; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h3>Sﾄｱfﾄｱr Hata Metin Ayﾄｱklayﾄｱcﾄｱ</h3>
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom:15px; color:white;">
    <button id="startBtn" onclick="processImage()">METNE Dﾃ訪 (TAM TARAMA)</button>
    <div id="status">Resim bekleniyor...</div>
    <div id="output"></div>
</div>

<script>
    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const btn = document.getElementById('startBtn');

        if (!fileInput.files[0]) return alert("Lﾃｼtfen resim seﾃｧin!");

        btn.disabled = true;
        output.innerText = "";
        status.innerText = "Yapay Zeka Hazﾄｱrlanﾄｱyor...";

        const file = fileInput.files[0];
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Hassasiyeti artﾄｱrmak iﾃｧin her parﾃｧayﾄｱ daha kﾃｼﾃｧﾃｼk (1000px) iﾅ殕iyoruz
            const segmentHeight = 1000;
            const totalSegments = Math.ceil(img.height / segmentHeight);
            
            // PSM 6: Sayfayﾄｱ tek bir blok metin olarak oku (Tablolar ve maﾃｧ skorlarﾄｱ iﾃｧin en iyisidir)
            const worker = await Tesseract.createWorker('tur+eng');
            
            await worker.setParameters({
                tessedit_pageseg_mode: '6', 
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzﾄ榲愬榮ｰﾃ姪僲淌ｼﾅ淨ｱﾃｶﾃｧ()-:., ',
            });

            let finalResult = "";

            for (let i = 0; i < totalSegments; i++) {
                status.innerText = `Okunuyor: %${Math.round((i/totalSegments)*100)} (Lﾃｼtfen Sayfayﾄｱ Kapatmayﾄｱn)`;

                const currentHeight = Math.min(segmentHeight, img.height - (i * segmentHeight));
                canvas.width = img.width;
                canvas.height = currentHeight;

                // Gﾃｶrﾃｼntﾃｼ ﾃ墨 ﾄｰﾅ殕eme (Sﾄｱfﾄｱr Hata ﾄｰﾃｧin Kritik Ayarlar)
                // Kontrastﾄｱ artﾄｱrﾄｱp resmi tamamen siyah-beyaz (Threshold) seviyesine getiriyoruz
                ctx.filter = 'grayscale(1) contrast(3) brightness(1.2) invert(0)';
                ctx.drawImage(img, 0, i * segmentHeight, img.width, currentHeight, 0, 0, img.width, currentHeight);
                
                // PNG formatﾄｱ veriyi kayﾄｱpsﾄｱz iletir (JPEG kullanmayﾄｱn)
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                const { data: { text } } = await worker.recognize(blob);
                
                finalResult += text;
                output.innerText = finalResult;
                output.scrollTop = output.scrollHeight;
            }

            status.innerText = "ﾄｰﾅ朖EM TAMAMLANDI!";
            btn.disabled = false;
            await worker.terminate();
        };

        img.src = objectUrl;
    }
</script>

</body>
</html>
