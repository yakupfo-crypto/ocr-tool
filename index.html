<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Keskin OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 15px; }
        .box { border: 2px solid #444; padding: 20px; border-radius: 10px; text-align: center; }
        #output { background: #000; color: #0f0; padding: 15px; margin-top: 15px; white-space: pre-wrap; font-size: 11px; text-align: left; border: 1px solid #333; }
        .loading { color: yellow; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box">
    <h3>IY Skor Odaklı Tarayıcı</h3>
    <input type="file" id="inp" accept="image/*">
    <div id="st" class="loading">Resim Seçilmedi</div>
    <div id="output">Sonuçlar...</div>
</div>

<script>
    const inp = document.getElementById('inp');
    const st = document.getElementById('st');
    const out = document.getElementById('output');

    inp.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        st.innerText = "Resim Keskinleştiriliyor...";
        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // KRİTİK ADIM: Resmi 3 kat büyütüyoruz ki küçük IY skorları devleşsin
            canvas.width = img.width * 3;
            canvas.height = img.height * 3;
            
            // Görüntü İşleme Filtreleri
            ctx.filter = 'contrast(2) grayscale(1) invert(1)'; 
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            st.innerText = "Yüksek Çözünürlüklü OCR Başladı...";
            
            const worker = await Tesseract.createWorker('tur');
            // PSM 4: Sütunlu veriler (maç skorları gibi) için en iyisidir
            await worker.setParameters({ tessedit_pageseg_mode: '4' });

            const { data: { text } } = await worker.recognize(canvas);
            
            // Gereksiz karakter temizliği
            out.innerText = text.replace(/[^a-zA-Z0-9\s\-\(\)\:]/g, ''); 
            st.innerText = "BİTTİ!";
            await worker.terminate();
        };
    };
</script>
</body>
</html>
