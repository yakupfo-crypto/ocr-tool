<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Sonuçları Temizleyici</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; padding: 10px; background: #1a1a1a; color: #00ff00; }
        .container { max-width: 600px; margin: auto; }
        #drop-area { border: 2px dashed #00ff00; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 10px; }
        #status { font-size: 14px; margin-bottom: 10px; color: yellow; }
        #output { background: #000; padding: 15px; border: 1px solid #333; min-height: 300px; white-space: pre; overflow-x: auto; font-size: 12px; }
        .btn-copy { background: #00ff00; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="drop-area">Ekrana Dokun ve Resmi Seç</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    <div id="status">Hazır...</div>
    <div id="output">Sonuçlar buraya gelecek...</div>
    <button class="btn-copy" onclick="copyText()">METNİ KOPYALA</button>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = function(e) {
        const file = e.target.files[0];
        if (file) processImage(file);
    };

    async function processImage(file) {
        output.innerText = "";
        status.innerText = "İşleniyor... Lütfen bekleyin.";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            const worker = await Tesseract.createWorker('tur');
            // PSM 4: Sütunlu veya liste yapılarını daha iyi korur
            await worker.setParameters({ tessedit_pageseg_mode: '4' });

            const { data: { text } } = await worker.recognize(img);
            
            // TEMİZLİK ALGORİTMASI
            const lines = text.split('\n');
            let formattedResult = "";

            lines.forEach(line => {
                let cleanLine = line
                    .replace(/[©®«»"~]/g, '') // Gereksiz sembolleri sil
                    .replace(/\s+/g, ' ')      // Fazla boşlukları temizle
                    .trim();

                // Eğer satırda skor (0-0 gibi) varsa düzenle
                if (cleanLine.length > 3) {
                    formattedResult += cleanLine + "\n";
                }
            });

            output.innerText = formattedResult;
            status.innerText = "İşlem Tamam!";
            await worker.terminate();
        };
    }

    function copyText() {
        navigator.clipboard.writeText(output.innerText);
        alert("Metin kopyalandı!");
    }
</script>
</body>
</html>
