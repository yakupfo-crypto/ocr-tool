<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıfır Hata Maç OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 15px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        #drop-area { border: 2px dashed #00ff00; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        #status { color: #fff; text-align: center; margin-bottom: 10px; font-size: 14px; }
        #output { background: #000; padding: 15px; border-radius: 5px; min-height: 300px; white-space: pre-wrap; font-size: 13px; line-height: 1.5; border: 1px solid #00ff00; }
        .progress { height: 5px; background: #333; margin-bottom: 20px; }
        #p-fill { height: 100%; background: #00ff00; width: 0%; }
        button { background: #00ff00; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="drop-area">EKRAN GÖRÜNTÜSÜNÜ BURAYA BIRAK VEYA SEÇ</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status">Sistem Hazır...</div>
    <div class="progress"><div id="p-fill"></div></div>
    
    <div id="output">Sonuçlar analiz ediliyor...</div>
    <button onclick="copyText()">Metni Kopyala</button>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const pFill = document.getElementById('p-fill');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = (e) => {
        const file = e.target.files[0];
        if (file) processImage(file);
    };

    async function processImage(file) {
        output.innerText = "";
        status.innerText = "Görüntü ön işleme tabi tutuluyor...";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Maç satırlarını daha iyi yakalamak için parçaları küçülttük
            const chunkH = 800; 
            const totalC = Math.ceil(img.height / chunkH);
            
            const worker = await Tesseract.createWorker('tur');
            
            // Hassas ayarlar: Satır bazlı okuma (PSM 7 veya 6)
            await worker.setParameters({
                tessedit_pageseg_mode: '6',
                tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-():. ',
            });

            for (let i = 0; i < totalC; i++) {
                const progress = Math.round(((i + 1) / totalC) * 100);
                status.innerText = `Okuma yapılıyor: %${progress}`;
                pFill.style.width = progress + "%";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const drawH = Math.min(chunkH, img.height - (i * chunkH));
                
                canvas.width = img.width;
                canvas.height = drawH;

                // Gelişmiş Filtre: Keskinleştirme ve yüksek kontrast
                ctx.filter = 'contrast(1.6) grayscale(1) brightness(1.1)';
                ctx.drawImage(img, 0, i * chunkH, img.width, drawH, 0, 0, img.width, drawH);
                
                const { data: { text } } = await worker.recognize(canvas);
                
                // Akıllı Düzenleyici: Gereksiz boşlukları ve karakter hatalarını temizle
                const formatted = text
                    .split('\n')
                    .filter(line => line.trim().length > 3) // Çok kısa anlamsız satırları at
                    .map(line => line.replace(/\s\s+/g, ' ')) // Çoklu boşlukları tek yap
                    .join('\n');

                output.innerText += formatted + "\n";
            }

            status.innerText = "Analiz başarıyla tamamlandı.";
            await worker.terminate();
        };
    }

    function copyText() {
        const el = document.createElement('textarea');
        el.value = output.innerText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Metin kopyalandı!");
    }
</script>
</body>
</html>
