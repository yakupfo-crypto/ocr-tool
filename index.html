<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınırsız Ücretsiz OCR</title>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
</head>
<body style="font-family:sans-serif; padding:20px;">
    <h3>Hızlı Metin Dönüştürücü</h3>
    <input type="file" id="input" accept="image/*" style="display: block; margin-bottom: 20px;">
    <button id="btn" style="padding:10px 20px; background:blue; color:white; border:none; border-radius:5px;">BAŞLAT</button>
    <div id="status" style="margin-top:10px; color:gray;">Durum: Hazır</div>
    <textarea id="output" style="width:100%; height:300px; margin-top:20px;"></textarea>

    <script>
        const btn = document.getElementById('btn');
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            if (!input.files[0]) return alert("Resim seçin!");
            status.innerText = "İşleniyor... Lütfen bekleyin.";
            
            // Dil paketini (tur) otomatik indirir ve tarayıcı hafızasına alır
            const worker = await Tesseract.createWorker('tur');
            const { data: { text } } = await worker.recognize(input.files[0]);
            
            output.value = text;
            status.innerText = "Tamamlandı!";
            await worker.terminate();
        };
    </script>
</body>
</html>
