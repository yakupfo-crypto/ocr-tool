<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıfır Hata OCR Bölücü Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #drop-area { border: 3px dashed #007bff; padding: 40px 20px; text-align: center; cursor: pointer; border-radius: 10px; color: #007bff; font-weight: bold; }
        #status { margin: 15px 0; color: #d9534f; font-weight: bold; font-size: 14px; }
        #output { white-space: pre-wrap; background: #fff; padding: 15px; border: 1px solid #ccc; border-radius: 8px; min-height: 150px; max-height: 400px; overflow-y: auto; font-size: 13px; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; margin-top: 10px; overflow: hidden; display: none; }
        #progress-fill { height: 100%; background: #28a745; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Süper Uzun Ekran İşleyici</h2>
    <div id="drop-area">RESMİ BURAYA YÜKLEYİN <br> (Dokun ve Seç)</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status">Hazır. Lütfen resim seçin.</div>
    <div class="progress-bar" id="pBar"><div id="progress-fill"></div></div>
    
    <div id="output" contenteditable="true">Metinler otomatik olarak burada birleşecek...</div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const pFill = document.getElementById('progress-fill');
    const pBar = document.getElementById('pBar');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = function(e) {
        const file = e.target.files[0];
        if (file) processLongImage(file);
    };

    async function processLongImage(file) {
        output.innerText = "";
        status.innerText = "Resim analiz ediliyor...";
        pBar.style.display = "block";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            const chunkHeight = 1500; // Resmi 1500 piksellik parçalara böl (Hata önleyici)
            const totalChunks = Math.ceil(img.height / chunkHeight);
            
            const worker = await Tesseract.createWorker('tur');
            
            for (let i = 0; i < totalChunks; i++) {
                status.innerText = `İşleniyor: Parça ${i + 1} / ${totalChunks}`;
                const progress = ((i + 1) / totalChunks) * 100;
                pFill.style.width = progress + "%";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const heightToDraw = Math.min(chunkHeight, img.height - (i * chunkHeight));
                
                canvas.width = img.width;
                canvas.height = heightToDraw;
                
                // Resmi belirli koordinattan kesip canvas'a yapıştır
                ctx.drawImage(img, 0, i * chunkHeight, img.width, heightToDraw, 0, 0, img.width, heightToDraw);
                
                const { data: { text } } = await worker.recognize(canvas);
                output.innerText += text + "\n";
            }

            status.innerText = "Tamamlandı! Tüm metinler birleştirildi.";
            await worker.terminate();
        };
    };
</script>
</body>
</html>
