<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürekli OCR Sistemi</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        #drop-area { border: 2px dashed #ccc; padding: 30px; text-align: center; background: white; }
        #output { white-space: pre-wrap; background: #fff; border: 1px solid #ddd; margin-top: 20px; padding: 15px; min-height: 200px; }
    </style>
</head>
<body>

    <div id="drop-area">
        <h3>Görüntüyü Buraya Yükleyin</h3>
        <input type="file" id="imageInput" accept="image/*">
    </div>
    
    <div id="status"></div>
    <div id="output" placeholder="Metin burada görünecek..."></div>

    <script>
        const API_KEY = 'BURAYA_GOOGLE_API_ANAHTARINI_YAZIN';
        const imageInput = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        imageInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "İşleniyor (Google Cloud Vision)...";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];

                const requestBody = {
                    requests: [{
                        image: { content: base64Content },
                        features: [{ type: "TEXT_DETECTION" }]
                    }]
                };

                try {
                    const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    const data = await response.json();
                    const resultText = data.responses[0].fullTextAnnotation.text;
                    output.innerText = resultText;
                    status.innerText = "Tamamlandı.";
                } catch (err) {
                    status.innerText = "Hata oluştu!";
                    console.error(err);
                }
            };
        };
    </script>
</body>
</html>
