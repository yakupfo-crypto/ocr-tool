<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı OCR Tarayıcı</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        #output { white-space: pre-wrap; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-top: 20px; min-height: 200px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        input { margin-bottom: 15px; }
    </style>
</head>
<body>

    <h3>Hızlı Metin Dönüştürücü</h3>
    <input type="file" id="gorselSecici" accept="image/*">
    <button onclick="metneDonustur()">METNE DÖNÜŞTÜR (SIFIR HATA)</button>
    
    <div id="durum"></div>
    <div id="output" contenteditable="true">Sonuç burada görünecek...</div>

    <script>
        const API_KEY = 'BURAYA_GOOGLE_DAN_ALDIGIN_KEYI_YAPISTIR';

        async function metneDonustur() {
            const dosyaInput = document.getElementById('gorselSecici');
            const outputDiv = document.getElementById('output');
            const durum = document.getElementById('durum');

            if (dosyaInput.files.length === 0) {
                alert("Lütfen önce ekran görüntüsünü seçin!");
                return;
            }

            durum.innerText = "İşleniyor... Lütfen bekleyin.";
            
            const reader = new FileReader();
            reader.readAsDataURL(dosyaInput.files[0]);
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];

                const istekGövdesi = {
                    requests: [{
                        image: { content: base64Image },
                        features: [{ type: "TEXT_DETECTION" }]
                    }]
                };

                try {
                    const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify(istekGövdesi)
                    });

                    const veri = await response.json();
                    const tamMetin = veri.responses[0].fullTextAnnotation.text;
                    
                    outputDiv.innerText = tamMetin;
                    durum.innerText = "Tamamlandı!";
                } catch (hata) {
                    outputDiv.innerText = "Hata oluştu: " + hata;
                    durum.innerText = "";
                }
            };
        }
    </script>
</body>
</html>
