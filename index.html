<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı OCR Tarayıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        #drop-zone { border: 2px dashed #007bff; padding: 30px; text-align: center; background: white; border-radius: 10px; }
        #output { white-space: pre-wrap; background: white; padding: 15px; margin-top: 20px; border-radius: 5px; border: 1px solid #ddd; min-height: 200px; font-size: 14px; }
        .loading { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="drop-zone">
        <h3>Görseli Seçin veya Buraya Bırakın</h3>
        <input type="file" id="image-input" accept="image/*" style="display: block; margin: 20px auto;">
        <div id="status">Durum: Hazır</div>
    </div>

    <div id="output">Metin burada görünecek...</div>

    <script>
        const input = document.getElementById('image-input');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        input.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerHTML = '<span class="loading">İşleniyor... Lütfen bekleyin.</span>';
            output.innerText = "Analiz ediliyor...";

            try {
                // 'tur' parametresi ile Türkçe karakterleri sıfır hataya yaklaştırır
                const result = await Tesseract.recognize(file, 'tur', {
                    logger: m => {
                        if(m.status === 'recognizing text') {
                            status.innerText = `İlerleme: %${(m.progress * 100).toFixed(0)}`;
                        }
                    }
                });

                output.innerText = result.data.text;
                status.innerText = "Durum: Tamamlandı!";
            } catch (error) {
                status.innerText = "Hata oluştu: " + error.message;
            }
        });
    </script>
</body>
</html>
