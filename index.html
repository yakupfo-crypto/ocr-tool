<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor OCR Pro - V3</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; padding: 10px; background: #1a1a1a; color: #00ff00; }
        .container { max-width: 600px; margin: auto; border: 1px solid #00ff00; padding: 15px; }
        #drop-area { border: 2px dashed #00ff00; padding: 25px; text-align: center; cursor: pointer; margin-bottom: 10px; }
        #status { font-size: 14px; margin: 10px 0; color: #ffae00; }
        #output { background: #000; padding: 15px; border-radius: 5px; min-height: 300px; white-space: pre-wrap; font-size: 13px; border: 1px solid #333; overflow-x: auto; }
        .progress { height: 5px; background: #333; margin-top: 5px; }
        #p-fill { height: 100%; background: #00ff00; width: 0%; }
    </style>
</head>
<body>

<div class="container">
    <h3>[ MAÇ VERİ DÖNÜŞTÜRÜCÜ ]</h3>
    <div id="drop-area">RESMİ BURAYA BIRAKIN</div>
    <input type="file" id="fileElem" accept="image/*" style="display:none">
    
    <div id="status">Sistem Hazır...</div>
    <div class="progress"><div id="p-fill"></div></div>
    
    <div id="output">Sonuçlar bekleniyor...</div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileElem = document.getElementById('fileElem');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const pFill = document.getElementById('p-fill');

    dropArea.onclick = () => fileElem.click();

    fileElem.onchange = (e) => { if(e.target.files[0]) process(e.target.files[0]); };

    async function process(file) {
        output.innerText = "";
        status.innerText = "Yükleniyor...";
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            const worker = await Tesseract.createWorker('tur');
            // PSM 6: Blok metin okuma, maç listeleri için en kararlısıdır.
            await worker.setParameters({
                tessedit_pageseg_mode: '6',
                tessjs_create_hocr: '0',
                tessjs_create_tsv: '0'
            });

            const chunkH = 800; // Daha küçük parçalar = Daha yüksek doğruluk
            const totalC = Math.ceil(img.height / chunkH);

            for (let i = 0; i < totalC; i++) {
                const progress = Math.round(((i + 1) / totalC) * 100);
                status.innerText = `İşleniyor: %${progress}`;
                pFill.style.width = progress + "%";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const drawH = Math.min(chunkH, img.height - (i * chunkH));

                // BÜYÜTME (Upscaling): Resmi 2 kat büyüterek IY skorlarını netleştiriyoruz
                canvas.width = img.width * 2;
                canvas.height = drawH * 2;

                ctx.filter = 'contrast(1.5) grayscale(1) brightness(1.1)';
                ctx.imageSmoothingEnabled = false; // Keskinliği koru
                ctx.drawImage(img, 0, i * chunkH, img.width, drawH, 0, 0, canvas.width, canvas.height);

                const { data: { text } } = await worker.recognize(canvas);
                
                // Gereksiz karakter temizliği ve düzenleme
                const cleanRow = text.replace(/[^a-zA-Z0-9şŞıİçÇöÖüÜğĞ\s\-:()]/g, '') // Karakter temizliği
                                   .replace(/\n\s*\n/g, '\n'); // Boş satırları sil
                
                output.innerText += cleanRow;
            }

            status.innerText = "SİSTEM TAMAMLANDI.";
            await worker.terminate();
        };
    }
</script>
</body>
</html>
