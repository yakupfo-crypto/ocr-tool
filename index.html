<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geli힊mi힊 Skor OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; padding: 10px; }
        .box { border: 2px solid #333; padding: 15px; border-radius: 8px; background: #111; }
        #output { width: 100%; height: 400px; background: #050505; color: #00ff00; border: 1px solid #222; margin-top: 10px; overflow-y: scroll; padding: 10px; font-family: monospace; font-size: 12px; }
        button { background: #d32f2f; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        progress { width: 100%; height: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h3>Ultra-Keskin OCR Motoru</h3>
    <input type="file" id="imageInput" accept="image/*" style="color:white; margin-bottom:10px;">
    <button onclick="processImage()">VER캅Y캅 AYIKLA</button>
    <p id="status" style="color: yellow;">Durum: Bekliyor...</p>
    <progress id="prog" value="0" max="100" style="display:none;"></progress>
    <div id="output"></div>
</div>

<script>
    async function processImage() {
        const input = document.getElementById('imageInput');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const prog = document.getElementById('prog');

        if (!input.files[0]) return alert("Dosya se챌!");

        status.innerText = "G철r체nt체 i힊leniyor (Geli힊mi힊 Filtre)...";
        prog.style.display = "block";
        output.innerText = "";

        const img = new Image();
        img.src = URL.createObjectURL(input.files[0]);

        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Hassasiyet i챌in par챌alar캇 k체챌체ltt체k (1000px)
            const segH = 1000;
            const total = Math.ceil(img.height / segH);
            
            const worker = await Tesseract.createWorker('tur');
            
            // Keskinlik Ayarlar캇
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz휒횥힇캅횜횉휓체힊캇철챌()-:/. ',
                tessjs_create_hocr: '0',
                tessjs_create_tsv: '0'
            });

            for (let i = 0; i < total; i++) {
                status.innerText = `캅힊leniyor: %${Math.round((i/total)*100)}`;
                prog.value = (i/total)*100;

                const h = Math.min(segH, img.height - (i * segH));
                canvas.width = img.width;
                canvas.height = h;

                // --- 횜N 캅힇LEME (KEEP TARZI ANAL캅Z) ---
                ctx.filter = 'grayscale(100%) contrast(300%) brightness(150%)';
                ctx.drawImage(img, 0, i * segH, img.width, h, 0, 0, img.width, h);
                
                // Pikselleri Keskinle힊tirme (Binarization benzeri efekt)
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let j = 0; j < data.length; j += 4) {
                    let avg = (data[j] + data[j+1] + data[j+2]) / 3;
                    let val = avg > 128 ? 255 : 0; // Siyah-Beyaz keskin ay캇r캇m
                    data[j] = data[j+1] = data[j+2] = val;
                }
                ctx.putImageData(imageData, 0, 0);

                const { data: { text } } = await worker.recognize(canvas);
                output.innerText += text + "\n";
            }

            status.innerText = "B캅TT캅!";
            prog.style.display = "none";
            await worker.terminate();
        };
    }
</script>

</body>
</html>
