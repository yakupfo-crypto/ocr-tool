<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Hassas Skor Okuyucu</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 10px; margin: 0; }
        .container { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        #output { 
            width: 100%; height: 550px; margin-top: 15px; padding: 10px; 
            border: 1px solid #00ff00; background: #050505; color: #00ff41; 
            white-space: pre; overflow: auto; font-size: 11px; font-family: monospace;
            box-sizing: border-box;
        }
        button { 
            background: #2962ff; color: white; border: none; padding: 18px; 
            border-radius: 8px; width: 100%; font-weight: bold; font-size: 16px;
        }
        #status { color: #ffeb3b; text-align: center; margin: 10px 0; font-size: 14px; }
        progress { width: 100%; height: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align:center; color:#2962ff;">Profesyonel OCR Paneli</h3>
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom:15px; width:100%;">
    <progress id="prog" value="0" max="100"></progress>
    <button id="btn" onclick="startOCR()">VERİLERİ AYIKLA (SIFIR HATA)</button>
    <div id="status">Hazır. Dosya seçin.</div>
    <div id="output">Sonuçlar burada görünecek...</div>
</div>

<script>
    async function startOCR() {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return alert("Resim seçin!");

        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const prog = document.getElementById('prog');
        const btn = document.getElementById('btn');

        btn.disabled = true;
        output.innerText = "";
        status.innerText = "Motor Başlatılıyor (LSTM Modu)...";

        // Tesseract İşçisini (Worker) Oluşturma
        const worker = await Tesseract.createWorker('tur+eng', 1, {
            logger: m => {
                if(m.status === 'recognizing text') {
                    prog.value = m.progress * 100;
                    status.innerText = `Okunuyor: %${Math.round(m.progress * 100)}`;
                }
            }
        });

        // KRİTİK AYARLAR: Karakter tanıma ve sayfa analizi
        await worker.setParameters({
            tessedit_pageseg_mode: '6', // PSM 6: Sayfayı tek bir blok olarak gör (Tablolar için daha iyidir)
            tessedit_ocr_engine_mode: '1', // OEM 1: Sadece LSTM (Yapay Zeka) motorunu kullan
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzĞÜŞİÖÇğüşıöç()-:., /',
            preserve_interword_spaces: '1'
        });

        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Profesyonel uygulamalar resmi 2-3 kat büyütür, biz de öyle yapıyoruz.
            // Bu, küçük skorların (parantez içindekiler) dev gibi görünmesini sağlar.
            canvas.width = img.width * 2; 
            canvas.height = img.height * 2;
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const { data: { text } } = await worker.recognize(canvas);
            
            output.innerText = text;
            status.innerText = "İŞLEM TAMAMLANDI!";
            btn.disabled = false;
            await worker.terminate();
        };
    }
</script>

</body>
</html>
